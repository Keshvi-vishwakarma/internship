 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coorg Mist</title>
    <link rel="stylesheet" href="style.css">
 </head>
 <body>

   <!--navbar code-->
   <div class="navbar">

      <!--logo and company name-->
      <div class="logo">
         <img src="logo.jpeg" alt="logo">
         <div class="company-name">
            <span>Coorg Mist</span>
         </div>
      </div>

      <!--menu bar-->
      <div class="menu-container">
            <ul class="menu-bar">
                <li class="menu-item">Home</li>
                <li class="menu-item">Service</li>
                <li class="menu-item">Contact</li>
                <li class="menu-item">About us</li>
            </ul>
        </div>
   </div>
   <!--cards code-->
    <div class="container">

      <!--card 1-->
      <div class="cardcontainer">
         <img src="americano.jpg" alt="img" class="imgcontainer">

         <div class="title">
            <h3>Americano</h3>
            <p> ₹170</p>
         </div>

         <div class="rating">
            <p>★★★★☆</p>
         </div>

         <div class="cartbtn">
            <button>Order now</button>
         </div>
      </div>

      <!--card 2-->
      <div class="cardcontainer">
         <img src="capacihino.jpg" alt="img" class="imgcontainer">

         <div class="title">
            <h3>Cappuccino</h3>
            <p> ₹140</p>
         </div>

         <div class="rating">
            <p>★★★★⯨</p>
         </div>

         <div class="cartbtn">
            <button>Order now</button>
         </div>
      </div>

      <!--card 3-->
      <div class="cardcontainer">
         <img src="espresso.jpg" alt="img" class="imgcontainer">

         <div class="title">
            <h3>Espresso</h3>
            <p> ₹110</p>
         </div>

         <div class="rating">
            <p>★★★⯨☆</p>
         </div>

         <div class="cartbtn">
            <button>Order now</button>
         </div>
      </div>

      <!--card 4-->
      <div class="cardcontainer">
         <img src="filtercoffee.jpg" alt="img" class="imgcontainer">

         <div class="title">
            <h3>Filter Coffee</h3>
            <p> ₹155</p>
         </div>

         <div class="rating">
            <p>★★★★★</p>
         </div>

         <div class="cartbtn">
            <button>Order now</button>
         </div>
      </div>
    </div>
 </body>
 </html>
