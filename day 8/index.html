<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>coorgmist hero-section</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>

    <!--navbar-->
    <div class="navbar">

      <!--logo and company name-->
      <div class="logo">
         <img src="logo.jpeg" alt="logo">
         <div class="company-name">
            <span>Coorg Mist</span>
         </div>
      </div>

      <!--menu bar-->
      <div class="menu-container">
            <ul class="menu-bar">
                <li class="menu-item">Home</li>
                <li class="menu-item">Service</li>
                <li class="menu-item">Contact</li>
                <li class="menu-item">About us</li>
            </ul>
        </div>
   </div>

    <!--hero section-->
    <section class="hero">
      <!-- Background Video -->
      <video autoplay muted loop>
        <source src="herovedio.mp4" type="video/mp4" />
      </video>

      <!-- Overlay -->
      <div class="overlay"></div>

      <!-- Content -->
      <div class="content">
        <h1>Taste of Coorg in Every Sip</h1>

        <p>
          Welcome to Coorg Mist, where freshly brewed coffee, handcrafted
          beverages, and delicious bites come together in a warm and cozy
          atmosphere.
        </p>

        <div class="buttons">
          <button>Explore Menu</button>
          <button class="btn2">Visit Us</button>
        </div>
      </div>
    </section>
  </body>
</html>
